name: Vinylkeep
options:
  bundleIdPrefix: com.shimondeitel.vinylkeep
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vinylkeep:
    type: application
    platform: iOS
    sources:
      - path: Vinylkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinylkeep
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vinylkeep/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VinylkeepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VinylkeepTests
      - path: Vinylkeep.storekit
    dependencies:
      - target: Vinylkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinylkeep.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VinylkeepUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VinylkeepUITests
    dependencies:
      - target: Vinylkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinylkeep.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vinylkeep:
    build:
      targets:
        Vinylkeep: all
        VinylkeepTests: [test]
        VinylkeepUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vinylkeep.storekit
    test:
      config: Debug
      storeKitConfiguration: Vinylkeep.storekit
      targets:
        - VinylkeepTests
        - VinylkeepUITests
    archive:
      config: Release
